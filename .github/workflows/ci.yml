name: CI

# Run on every push to main and on every pull request. The matrix
# crosses Linux + macOS × Python 3.11/3.12/3.13 to catch the kind
# of cross-platform landmines we hit during Phase 1 (e.g. macOS
# Sequoia's UF_HIDDEN flag on freshly-created .pth files breaking
# Python 3.13's site.py editable-install path).
on:
  push:
    branches: [main]
  pull_request:

# Don't pile up redundant runs when a PR is force-pushed; cancel
# in-flight runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest packages/ -q

      - name: Lint with ruff
        run: uv run ruff check .
